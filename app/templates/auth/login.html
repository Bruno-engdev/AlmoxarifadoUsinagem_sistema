<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Almoxarifado de Ferramentas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-primary);
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            padding: 2.5rem 2rem;
        }
        .login-logo {
            max-width: 240px;
            height: auto;
            margin-bottom: 1.5rem;
        }
        .login-title {
            color: var(--text-primary);
            font-weight: 700;
            font-size: 1.3rem;
            margin-bottom: 0.25rem;
        }
        .login-subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.75rem;
        }
        .login-card .form-control {
            padding: 0.7rem 1rem;
            font-size: 0.95rem;
        }
        .login-card .btn-primary {
            padding: 0.7rem;
            font-size: 1rem;
        }
        .login-icon {
            color: var(--accent-blue);
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card text-center">
            <img src="/static/images/DHALMARLOGO.png" alt="Logo" class="login-logo">
            <div class="login-icon">
                <i class="bi bi-shield-lock"></i>
            </div>
            <div class="login-title">Almoxarifado de Ferramentas</div>
            <div class="login-subtitle">Faça login para acessar o sistema</div>

            {% if error %}
            <div class="alert alert-danger py-2 mb-3" role="alert">
                <i class="bi bi-exclamation-triangle me-1"></i>{{ error }}
            </div>
            {% endif %}

            <form method="post" action="/login">
                <div class="mb-3 text-start">
                    <label for="username" class="form-label">Usuário</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="username" name="username"
                               placeholder="Digite seu usuário" required autofocus>
                    </div>
                </div>
                <div class="mb-4 text-start">
                    <label for="password" class="form-label">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-key"></i></span>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Digite sua senha" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
                </button>
            </form>

            <div class="text-muted mt-4" style="font-size: 0.8rem;">
                Sistema de Almoxarifado de Ferramentas &copy; 2026
            </div>
        </div>
    </div>
</body>
</html>
